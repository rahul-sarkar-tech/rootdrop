name: rootdrop
description: "Privacy-first, cross-platform peer-to-peer LAN file sharing. No cloud, no accounts, no tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.0

  # File system
  path_provider: ^2.1.0
  file_picker: ^8.0.0

  # Utilities
  uuid: ^4.0.0
  crypto: ^3.0.0
  google_fonts: ^6.0.0
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
